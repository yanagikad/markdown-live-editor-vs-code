<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="%%CSP%%" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Live Editor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        color: var(--vscode-editor-foreground);
        background: var(--vscode-editor-background);
        font-family: var(--vscode-font-family);
      }
      #root {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      #toolbar {
        padding: 8px 12px;
        border-bottom: 1px solid var(--vscode-panel-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      #preview {
        min-height: 0;
        height: 100%;
        overflow: auto;
        padding: 18px;
        outline: none;
      }
      #preview:focus {
        box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--vscode-focusBorder) 65%, transparent);
      }
      #preview :is(h1,h2,h3,h4,h5,h6) { font-family: "Avenir Next","Hiragino Sans",sans-serif; }
      #preview blockquote { margin-left: 0; padding-left: 12px; border-left: 4px solid var(--vscode-textLink-foreground); }
      #preview pre { padding: 10px; border-radius: 8px; overflow-x: auto; background: var(--vscode-textCodeBlock-background); }
      #preview code { font-family: var(--vscode-editor-font-family); }
      #theme-label { opacity: 0.75; font-size: 12px; }
      #edit-hint { opacity: 0.7; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="toolbar">
        <div id="theme-label">Theme: <span id="theme-value">%%INITIAL_THEME%%</span></div>
        <div id="edit-hint">Edit directly in preview. Markdown file updates live.</div>
      </div>
      <div id="preview" contenteditable="true" spellcheck="false">%%INITIAL_HTML%%</div>
    </div>

    <script nonce="%%NONCE%%" src="https://cdn.jsdelivr.net/npm/turndown@7.2.0/dist/turndown.js"></script>
    <script nonce="%%NONCE%%" src="https://cdn.jsdelivr.net/npm/turndown-plugin-gfm@1.0.2/dist/turndown-plugin-gfm.js"></script>
    <script nonce="%%NONCE%%" src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script nonce="%%NONCE%%" src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script nonce="%%NONCE%%" src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script nonce="%%NONCE%%" type="module">
      import MarkdownIt from "https://esm.sh/markdown-it@14.1.0";

      let bootstrapState = { markdown: "", html: "", themeType: "dark" };
      try {
        bootstrapState = JSON.parse(decodeURIComponent("%%BOOTSTRAP_STATE%%"));
      } catch (e) { console.error(e); }

      const vscode = acquireVsCodeApi();
      const preview = document.getElementById("preview");
      const themeValue = document.getElementById("theme-value");
      const turndown = new TurndownService({
        headingStyle: "atx",
        codeBlockStyle: "fenced",
        bulletListMarker: "-"
      });
      if (typeof turndownPluginGfm !== "undefined" && turndownPluginGfm.gfm) {
        turndown.use(turndownPluginGfm.gfm);
      }

      turndown.addRule("mermaid", {
        filter: (node) => node.nodeName === "DIV" && node.classList?.contains("mermaid"),
        replacement: (_content, node) => {
          const source = node.getAttribute("data-mermaid-source") || node.textContent || "";
          return "\n\n```mermaid\n" + source.trim() + "\n```\n\n";
        }
      });

      const md = new MarkdownIt({ html: true, linkify: true, breaks: true });
      const origFence = md.renderer.rules.fence;
      md.renderer.rules.fence = (tokens, idx, options, env, self) => {
        const token = tokens[idx];
        const info = (token.info || "").trim();
        if (info === "mermaid") {
          const esc = token.content
            .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
          return '<div class="mermaid">' + esc + "</div>";
        }
        return origFence ? origFence(tokens, idx, options, env, self) : self.renderToken(tokens, idx, options);
      };

      let latestTheme = bootstrapState.themeType || "dark";
      let applyingRemote = false;
      let debounce = 0;
      let localRenderDebounce = 0;
      let isComposing = false;
      let latestMarkdown = bootstrapState.markdown || "";

      function mermaidTheme(t) {
        return t === "light" ? "default" : t === "high-contrast" ? "neutral" : "dark";
      }

      function enhance() {
        try {
          mermaid.initialize({ startOnLoad: false, securityLevel: "strict", theme: mermaidTheme(latestTheme) });
          const nodes = preview.querySelectorAll(".mermaid");
          for (const node of nodes) {
            if (!node.getAttribute("data-mermaid-source")) {
              node.setAttribute("data-mermaid-source", node.textContent || "");
            }
          }
          if (nodes.length) mermaid.run({ nodes });
        } catch (e) { console.error(e); }
        try {
          renderMathInElement(preview, {
            delimiters: [{ left: "$$", right: "$$", display: true }, { left: "$", right: "$", display: false }],
            throwOnError: false
          });
        } catch (e) { console.error(e); }
      }

      function renderPreview(markdownText) {
        preview.innerHTML = md.render(markdownText);
        enhance();
      }

      function captureCaretOffset(container) {
        const selection = window.getSelection();
        if (!selection || selection.rangeCount === 0) return null;
        const range = selection.getRangeAt(0);
        if (!container.contains(range.startContainer)) return null;

        const preRange = range.cloneRange();
        preRange.selectNodeContents(container);
        preRange.setEnd(range.startContainer, range.startOffset);
        return preRange.toString().length;
      }

      function restoreCaretOffset(container, offset) {
        if (offset == null) return;

        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
        let remaining = offset;
        let node = walker.nextNode();

        while (node) {
          const textLength = node.textContent ? node.textContent.length : 0;
          if (remaining <= textLength) {
            const range = document.createRange();
            range.setStart(node, remaining);
            range.collapse(true);
            const selection = window.getSelection();
            if (selection) {
              selection.removeAllRanges();
              selection.addRange(range);
            }
            return;
          }
          remaining -= textLength;
          node = walker.nextNode();
        }
      }

      function renderPreviewPreserveCaret(markdownText) {
        const caretOffset = captureCaretOffset(preview);
        renderPreview(markdownText);
        restoreCaretOffset(preview, caretOffset);
      }

      function sendUpdate(markdownText) {
        if (debounce) clearTimeout(debounce);
        debounce = setTimeout(() => {
          vscode.postMessage({ type: "updateMarkdown", markdown: markdownText, source: "preview-editor" });
        }, 50);
      }

      function normalizeMarkdownFromPreview(markdownText) {
        return markdownText
          .replace(/^(\s*)\\#(?=\s)/gm, "$1#")
          .replace(/^(\s*)\\\*(?=\s)/gm, "$1-")
          .replace(/^(\s*)\\-(?=\s)/gm, "$1-");
      }

      function shouldRenderFocusedPreview(markdownText) {
        const lines = markdownText.split(/\r?\n/);
        const lastLine = (lines.at(-1) || "").replace(/\u00a0/g, " ");
        const trimmed = lastLine.trim();

        if (trimmed === "") {
          return false;
        }

        if (/^#{1,6}\s+\S.*$/.test(trimmed)) {
          return true;
        }

        if (/^[-*+]\s+\S.*$/.test(trimmed)) {
          return true;
        }

        return /^\d+[.)]\s+\S.*$/.test(trimmed);
      }

      function queueFocusedRender(markdownText) {
        if (localRenderDebounce) clearTimeout(localRenderDebounce);

        localRenderDebounce = setTimeout(() => {
          if (document.activeElement !== preview || isComposing) return;
          if (!shouldRenderFocusedPreview(markdownText)) return;
          renderPreviewPreserveCaret(markdownText);
        }, 180);
      }

      themeValue.textContent = latestTheme;
      renderPreview(latestMarkdown);

      preview.addEventListener("compositionstart", () => {
        isComposing = true;
      });

      preview.addEventListener("compositionend", () => {
        isComposing = false;
        const markdownText = normalizeMarkdownFromPreview(turndown.turndown(preview.innerHTML));
        latestMarkdown = markdownText;
        sendUpdate(markdownText);
        queueFocusedRender(markdownText);
      });

      preview.addEventListener("input", (event) => {
        if (applyingRemote || isComposing) return;

        const markdownText = normalizeMarkdownFromPreview(turndown.turndown(preview.innerHTML));
        latestMarkdown = markdownText;

        sendUpdate(markdownText);

        if (event.inputType === "insertText") {
          queueFocusedRender(markdownText);
        }
      });

      preview.addEventListener("blur", () => {
        if (isComposing) return;
        if (localRenderDebounce) clearTimeout(localRenderDebounce);
        renderPreview(latestMarkdown);
      });

      window.addEventListener("message", (event) => {
        const msg = event.data;
        if (msg.type !== "init" && msg.type !== "render") return;

        applyingRemote = true;
        latestTheme = msg.themeType;
        themeValue.textContent = msg.themeType;

        latestMarkdown = msg.markdown || "";

        if (msg.source === "preview-editor") {
          if (document.activeElement === preview || isComposing) {
            applyingRemote = false;
            return;
          }

          preview.innerHTML = msg.html || "";
          enhance();
          applyingRemote = false;
          return;
        }

        preview.innerHTML = msg.html || "";
        enhance();
        applyingRemote = false;
      });

      vscode.postMessage({ type: "ready" });
    </script>
  </body>
</html>
